<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GemIndia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #1a6b3c, #0d4a28);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a6b3c;
        }
        .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Sora', sans-serif;
        }
        input:focus {
            outline: none;
            border-color: #1a6b3c;
            box-shadow: 0 0 0 3px rgba(26, 107, 60, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a6b3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0d4a28;
        }
        .error {
            color: #e53e3e;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>🔐 Admin Login</h1>
    <p class="subtitle">Enter password to access admin panel</p>
    <form method="GET" action="/admin">
        <input type="password" name="password" placeholder="Enter admin password" required autofocus>
        <button type="submit">Login</button>
    </form>
</div>
</body>
