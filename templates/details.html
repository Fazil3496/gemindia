<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ place.name }} - GemIndia</title>
    <style>
        body { font-family: 'Sora', sans-serif; background: #f5f5f0; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; }
        img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← Back to Home</a>
        <h1>{{ place.name }}</h1>
        <img src="{{ place.image }}" alt="{{ place.name }}">
        <p><strong>District:</strong> {{ place.district }}</p>
        <p>{{ place.description }}</p>
        <p><strong>Budget:</strong> {{ place.budget }}</p>
    </div>
</body>
</html>
